<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Equipment | Reginald SHERQ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: Arial, sans-serif; }
        .card { border-radius: 12px; border: none; }
        .card-header { background-color: #003366; color: white; border-radius: 12px 12px 0 0 !important; }
        .btn-save { background-color: #99cc33; color: #003366; font-weight: bold; border: none; }
        .btn-save:hover { background-color: #88bb22; color: white; }
        .form-label { font-weight: bold; color: #003366; }
        .readonly-id { background-color: #e9ecef; border: 2px solid #003366; color: #003366; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header text-center py-3">
                        <h4 class="mb-0">Add New {{ category.replace('_', ' ').title() }}</h4>
                    </div>
                    <div class="card-body p-4">
                        <form method="POST" action="/admin/add_asset/{{ category }}">
                            <div class="mb-3">
                                <label class="form-label">Generated Asset ID</label>
                                <input type="text" class="form-control readonly-id" value="{{ next_id }}" readonly>
                                <small class="text-muted">Unique ID assigned automatically by the system.</small>
                            </div>
                            
                            {% if category == 'extinguisher' or category == 'extinguishers' or category == 'Fire Extinguisher' %}
                            <div class="mb-3">
                                <label class="form-label">Extinguisher Type</label>
                                <select name="type" class="form-select" required>
                                    <option value="" selected disabled>Select Type</option>
                                    <option value="CO2">CO2</option>
                                    <option value="Dry Powder">Dry Powder</option>
                                    <option value="DCP">DCP</option>
                                    <option value="Foam">Foam</option>
                                </select>
                            </div>
                            {% endif %}

                            <div class="mb-3">
                                <label class="form-label">Unit Weight / Capacity</label>
                                <input type="text" name="weight" class="form-control" placeholder="e.g. 9kg or 30m" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Authorized Location</label>
                                <input type="text" name="location" class="form-control" placeholder="e.g. Main Reception" required>
                            </div>

                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-save">Save Equipment</button>
                                <a href="/admin/register" class="btn btn-outline-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
