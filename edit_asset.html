<!DOCTYPE html>
<html>
<head>
    <title>Edit Asset | Reginald SHERQ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow p-4 mx-auto" style="max-width: 500px;">
            <h3 class="mb-4">Edit Details: {{ qr_id }}</h3>
            
            <form method="POST" action="/admin/edit_asset/{{ category }}/{{ qr_id }}">
                
                {% if category == 'extinguisher' or category == 'extinguishers' or category == 'Fire Extinguisher' %}
                <div class="mb-3">
                    <label>Type</label>
                    <input type="text" name="type" class="form-control" value="{{ item.extinguisher_type if item else '' }}">
                </div>
                {% endif %}
                
                <div class="mb-3">
                    <label>Location</label>
                    <input type="text" name="location" class="form-control" value="{{ item.authorized_location if item else '' }}">
                </div>
                
                <div class="mb-3">
                    <label>Weight/Size</label>
                    <input type="text" name="weight" class="form-control" value="{{ item.unit_weight if item else '' }}">
                </div>
                
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success flex-grow-1">Save Changes</button>
                    <a href="/admin/register" class="btn btn-secondary flex-grow-1">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
