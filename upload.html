<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Evidence | Reginald SHERQ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: #003366; color: white; padding-top: 50px;">
    <div class="container text-center">
        <div class="card p-4 mx-auto text-dark shadow-lg" style="max-width: 400px; border-radius: 15px;">
            <h4 class="fw-bold" style="color: #003366;">Upload Site Photo</h4>
            <p class="text-muted">Asset ID: <strong style="color: #99cc33;">{{ qr_id }}</strong></p>
            
            <hr>

            <!-- Form pointing to the process_upload route we added in app.py -->
            <form action="{{ url_for('process_upload', qr_id=qr_id) }}" method="POST" enctype="multipart/form-data">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-uppercase">Select Evidence Image</label>
                    <input type="file" class="form-control" name="asset_image" accept="image/*" capture="environment" required>
                    <small class="text-muted">Snap a photo using your camera or choose a file.</small>
                </div>
                
                <div class="d-grid gap-2">
                    <button type="submit" class="btn fw-bold" style="background-color: #99cc33; color: white;">
                        Save to Database
                    </button>
                    <!-- Changed Cancel link to go back to the Register as Milly prefers -->
                    <a href="{{ url_for('register') }}" class="btn btn-link text-muted text-decoration-none small">
                        Cancel and return to Register
                    </a>
                </div>
            </form>
        </div>
        
        <div class="mt-4">
            <small class="opacity-50">© 2026 Reginald SHERQ Services | WSU Project IV</small>
        </div>
    </div>
</body>
</html>
