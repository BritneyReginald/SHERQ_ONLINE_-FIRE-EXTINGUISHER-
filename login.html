<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Reginald SHERQ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #003366; color: white; font-family: Arial, sans-serif; display: flex; align-items: center; min-height: 100vh; }
        .brand-green { color: #99cc33; }
        .card { border: none; border-radius: 10px; color: #003366; }
        .btn-login { background-color: #99cc33; color: white; font-weight: bold; border: none; }
        .btn-login:hover { background-color: #82ad2b; }
    </style>
</head>
<body>
    <div class="container">
        <div class="text-center mb-4">
            <h2 class="fw-bold">REGINALD<span class="brand-green">SHERQ</span></h2>
            <p class="small text-uppercase opacity-75">Management Portal Access</p>
        </div>
        
        <div class="card p-4 mx-auto" style="max-width: 400px;">
            <h4 class="mb-4 fw-bold text-center">Admin Login</h4>
            <form action="/login" method="POST">
                <div class="mb-3">
                    <label class="form-label small fw-bold">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-login p-2">Unlock Dashboard</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
