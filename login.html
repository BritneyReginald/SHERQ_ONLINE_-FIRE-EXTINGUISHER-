<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Reginald SHERQ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(rgba(26, 54, 93, 0.9), rgba(26, 54, 93, 0.9)), 
                        url('https://images.unsplash.com/photo-1582213706342-998897597f7e?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.98);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        /* Header Block */
        .brand-header {
            background-color: #1a365d;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .brand-text { font-weight: bold; font-size: 1.1rem; }
        .brand-green { color: #99cc33; }
        .sub-text { font-size: 0.6rem; letter-spacing: 1px; color: #cbd5e0; }

        /* Input Styles */
        .form-control { margin-bottom: 15px; border-radius: 6px; }

        /* Main Sign In Button */
        .btn-signin {
            background-color: #1a365d;
            color: white;
            font-weight: 800;
            width: 100%;
            padding: 12px;
            border-radius: 50px;
            border: none;
            margin-bottom: 15px;
        }
        .btn-signin:hover { background-color: #2c5282; color: white; }

        /* Back to Home Link */
        .back-link {
            color: #1a365d;
            font-size: 0.9rem;
            text-decoration: underline;
            cursor: pointer;
        }
        h2 { color: #1a365d; font-size: 1.2rem; font-weight: bold; margin-bottom: 1.5rem; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand-header">
            <div class="brand-text">REGINALD<span class="brand-green">SHERQ</span>SERVICES</div>
            <div class="sub-text">SAFETY • HEALTH • ENVIRONMENT • RISK • QUALITY</div>
        </div>

        <h2>SYSTEM LOGIN</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-danger text-center p-2">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="text" name="username" class="form-control" placeholder="Username" required>
            <input type="password" name="password" class="form-control" placeholder="Password" required>
            <button type="submit" class="btn btn-signin">SIGN IN</button>
        </form>
        
        <a href="{% if request.args.get('next') %}{{ url_for('details', qr_code_id=request.args.get('next').split('/')[-1]) }}{% else %}/{% endif %}" class="back-link">Back to Home</a>
    </div>

</body>
</html>
